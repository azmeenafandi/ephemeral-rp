name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci
      - run: npm test -- --run

      - name: Build frontend
        run: VITE_API_BASE_URL=https://private-ai-roleplay.azmeen-afandi.workers.dev/api npm run build
        working-directory: .

      - name: Deploy Worker
        run: npx wrangler deploy
        working-directory: worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
