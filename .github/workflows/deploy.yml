name: Deploy

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main]
    paths-ignore:
      - '.understand-anything/**'
      - 'README.md'
      - 'LICENSE'
      - 'CLOUDFLARE.md'
      - 'SPEC.md'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - run: npm ci
      - run: npm test -- --run

      - name: Build frontend
        run: |
          VITE_API_BASE_URL=https://private-ai-roleplay.azmeen-afandi.workers.dev/api npm run build
          rm -rf .wrangler
        working-directory: .

      - name: Deploy Worker
        run: npx wrangler deploy
        working-directory: worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
